services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hokori
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hokori}
      POSTGRES_DB: hokori
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hokori -d hokori"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: production
      DATABASE_URL: postgresql://hokori:${POSTGRES_PASSWORD:-hokori}@db:5432/hokori?schema=public
      ACCESS_SECRET: ${ACCESS_SECRET:?set ACCESS_SECRET in .env}
      REFRESH_SECRET: ${REFRESH_SECRET:?set REFRESH_SECRET in .env}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "3003:3003"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3003}
        VITE_IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  pgdata:
