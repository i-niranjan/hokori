name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx turbo typecheck
        env:
          # Server env validation runs at import time in typecheck-adjacent
          # tooling; provide harmless CI values.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ACCESS_SECRET: ci-only-access-secret-value
          REFRESH_SECRET: ci-only-refresh-secret-value
          CLIENT_URL: http://localhost:5173
          IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/ci
          IMAGEKIT_PUBLIC_KEY: ci
          IMAGEKIT_PRIVATE_KEY: ci

      - name: Build
        run: npx turbo build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ACCESS_SECRET: ci-only-access-secret-value
          REFRESH_SECRET: ci-only-refresh-secret-value
          CLIENT_URL: http://localhost:5173
          IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/ci
          IMAGEKIT_PUBLIC_KEY: ci
          IMAGEKIT_PRIVATE_KEY: ci
